- name: Install system dependencies
  run: |
    sudo apt update
    sudo apt install -y \
      build-essential \
      git \
      zip \
      unzip \
      openjdk-17-jdk \
      python3-pip \
      python3-setuptools \
      python3-wheel \
      ffmpeg \
      libsdl2-dev \
      libsdl2-image-dev \
      libsdl2-mixer-dev \
      libsdl2-ttf-dev \
      libportmidi-dev \
      libswscale-dev \
      libavformat-dev \
      libavcodec-dev \
      libavutil-dev \
      zlib1g-dev \
      libunwind-dev \
      libgstreamer1.0-dev \
      libgstreamer-plugins-base1.0-dev \
      cmake \
      autoconf \
      automake \
      libtool \
      pkg-config \
      libffi-dev \
      m4 \
      libpulse-dev \
      libasound2-dev \
      libegl1-mesa-dev \
      libgles2-mesa-dev \
      libgl1-mesa-dev \
      libglu1-mesa-dev \
      libx11-dev \
      libxext-dev \
      libxrandr-dev \
      libxi-dev \
      libxinerama-dev \
      libxcursor-dev \
      libxfixes-dev \
      libxss-dev \
      libxv-dev
