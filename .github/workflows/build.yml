name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Buildozer
        run: |
          # Примусове прийняття ліцензій
          mkdir -p $ANDROID_HOME/licenses
          echo -e "247a1c6d2130e386b033722a45d0c73243265578\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb743830217961d4187e" > $ANDROID_HOME/licenses/android-sdk-license
          yes | sdkmanager --licenses || true
          
          # Очищення та збірка
          rm -rf .buildozer/android/platform/build-arm64-v8a/dists
          buildozer -v android debug
          

      - name: Build with Buildozer
        run: |
          # Автоматичне прийняття ліцензій Android SDK
          yes | sdkmanager --licenses || true
          # Очищення старих дистрибутивів
          rm -rf .buildozer/android/platform/build-arm64-v8a/dists
          # Запуск збірки
          buildozer -v android debug
        env:
          ACCEPT_SDK_LICENSE: "yes"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VolvoApp-APK
          path: bin/*.apk
          
