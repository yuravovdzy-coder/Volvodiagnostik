name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    # Використовуємо стабільну Ubuntu 22.04
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt update
          # Додано libunwind-dev для виправлення помилки GStreamer
          sudo apt install -y build-essential git python3 python3-dev ffmpeg \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            zlib1g-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-good1.0-dev libtool autoconf automake pkg-config \
            libffi-dev m4 gettext libunwind-dev
          pip install --user buildozer cython

      - name: Build with Buildozer
        run: |
          # Очищення перед початком, щоб уникнути конфліктів макросів
          buildozer android clean
          yes | buildozer android debug
        env:
