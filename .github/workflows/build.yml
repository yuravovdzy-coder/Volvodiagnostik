name: Build APK (Optimized)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -p -y \
            build-essential git python3-dev ffmpeg libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev \
            libavformat-dev libavcodec-dev zlib1g-dev libsqlite3-dev sqlite3 \
            bzip2 libbz2-dev libssl-dev openssl libgdbm-dev libgdbm-compat-dev \
            libncurses5-dev libreadline6-dev libdb5.3-dev libexpat1-dev \
            liblzma-dev libffi-dev uuid-dev tar \
            autoconf automake libtool libtool-bin m4 pkg-config
          
          pip install --user --upgrade pip
          pip install --user "cython<3.0.0" buildozer
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build with Buildozer
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          # Ми не використовуємо 'clean' тут, щоб уникнути помилки FileNotFoundError на чистій системі
          ~/.local/bin/buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VolvoApp_Debug
          path: bin/*.apk
          
