name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04   # стабільніше ніж latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Явно ставимо Node.js 24 (щоб не було warning)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ✅ Оновлюємо pip і ставимо залежності нормально
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential git python3 python3-dev ffmpeg \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            zlib1g-dev libgstreamer1.0-dev libgstreamer1.0-plugins-base1.0-dev

          python -m pip install --upgrade pip
          pip install buildozer cython

      # ✅ Даємо права (часто причина exit 100)
      - name: Fix permissions
        run: chmod +x buildozer

      # ✅ Основна збірка
      - name: Build with Buildozer
        run: |
          buildozer android clean
          yes | buildozer android debug
        env:
          ACCEPT_SDK_LICENSE: "yes"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VolvoApp-Clean-APK
          path: bin/*.apk
