name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    # Змінюємо на стабільну версію, щоб уникнути помилок з autoconf
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3 python3-dev ffmpeg \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            zlib1g-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-good1.0-dev libtool autoconf automake pkg-config \
            libffi-dev m4 gettext
          pip install --user buildozer cython

      - name: Build with Buildozer
        run: |
          # Видаляємо можливі залишки попередніх невдалих спроб
          rm -rf .buildozer
          yes | buildozer android debug
        env:
          ACCEPT_SDK_LICENSE: "yes"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VolvoApp-Package
          path: bin/*.apk
