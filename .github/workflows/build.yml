name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # --- ОСЬ ЦЕЙ НОВИЙ БЛОК ---
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      # --------------------------

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3 python3-dev ffmpeg \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            zlib1g-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-good1.0-dev libtool autoconf automake pkg-config \
            libffi-dev m4 gettext libunwind-dev
          # Використовуємо Cython 0.29.x для стабільності jnius
          pip install --user "cython<3.0.0" buildozer

      - name: Build with Buildozer
        run: |
          # Видаляємо старі дистрибутиви, щоб Gradle не видавав Broken pipe
          rm -rf .buildozer/android/platform/build-arm64-v8a/dists
          # Запуск з прапорцем -v (verbose), щоб бачити деталі в реальному часі
          buildozer -v android debug
        env:
          ACCEPT_SDK_LICENSE: "yes"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VolvoApp-APK
          path: bin/*.apk
          
