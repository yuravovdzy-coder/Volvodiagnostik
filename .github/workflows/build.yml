name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
  run: |
    sudo apt update
    sudo apt install -y \
      build-essential \
      git \
      zip \
      unzip \
      openjdk-17-jdk \
      python3-pip \
      python3-setuptools \
      python3-wheel \
      ffmpeg \
      libsdl2-dev \
      libsdl2-image-dev \
      libsdl2-mixer-dev \
      libsdl2-ttf-dev \
      libportmidi-dev \
      libswscale-dev \
      libavformat-dev \
      libavcodec-dev \
      libavutil-dev \
      zlib1g-dev \
      libunwind-dev \
      libgstreamer1.0-dev \
      libgstreamer-plugins-base1.0-dev \
      cmake \
      autoconf \
      automake \
      libtool \
      pkg-config \
      libffi-dev \
      m4 \
      libpulse-dev \
      libasound2-dev \
      libegl1-mesa-dev \
      libgles2-mesa-dev \
      libgl1-mesa-dev \
      libglu1-mesa-dev \
      libx11-dev \
      libxext-dev \
      libxrandr-dev \
      libxi-dev \
      libxinerama-dev \
      libxcursor-dev \
      libxfixes-dev \
      libxss-dev \
      libxv-dev

      - name: Upgrade pip & install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Build APK
        run: |
          buildozer android clean
          buildozer -v android debug
        env:
          ACCEPT_SDK_LICENSE: "yes"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VolvoApp-Clean-APK
          path: bin/*.apk
